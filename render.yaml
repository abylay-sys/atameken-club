services:
  - type: web
    name: atameken-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MODERATOR_CHAT_ID
        sync: false
      # ── Email (Resend) для восстановления пароля + уведомлений ──
      # Free 100 emails/day. Без ключа — ссылки логируются в Render Logs.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: ATAMEKEN Club <noreply@atameken.club>
      - key: APP_BASE_URL
        value: https://atameken.club
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_BASE64
        sync: false
      # ── AI-переводчик чата ──
      # TRANSLATE_PROVIDER: пусто=авто | ollama | openai | off
      # Для локального Ollama задать OLLAMA_URL (напр. https://ollama.example.com)
      - key: TRANSLATE_PROVIDER
        sync: false
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        value: qwen2.5:7b
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # ── S3-совместимое хранилище для файлов публикаций ──
      # Рекомендуется Cloudflare R2 (10GB бесплатно + 0 egress).
      # Если эти переменные не заданы — fallback на /tmp/ (файлы стираются при деплое!).
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_PUBLIC_BASE
        sync: false
      - key: S3_PREFIX
        value: uploads
