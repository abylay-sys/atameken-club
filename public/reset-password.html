<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Установка нового пароля - ATAMEKEN Club</title>
<meta name="description" content="Установка нового пароля для аккаунта на платформе ATAMEKEN Club."/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="/assets/logo.png" alt="ATAMEKEN Club" width="56" height="56" style="border-radius:50%;margin:0 auto 0.5rem"/>
      <div class="auth-brand-name" style="font-size:1rem;font-weight:500;letter-spacing:.02em;line-height:1.05">Бизнес-сообщество</div>
      <div class="auth-brand-name" style="font-size:1.2rem;font-weight:600;letter-spacing:.04em;margin-top:.1rem">«ATAMEKEN Club»</div>
      <div class="auth-brand-sub">Новый пароль</div>
    </div>

    <div class="card">
      <div class="card-hd">
        <h2>Установите новый пароль</h2>
        <p>Минимум 8 символов. После сохранения вы будете автоматически отключены на всех устройствах — войдите заново с новым паролем.</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="reset-form">
        <div class="field">
          <label for="password">Новый пароль</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password" placeholder="Минимум 8 символов"/>
          <div class="field-hint" id="strength-hint" style="font-size:.72rem;color:#94a3b8;margin-top:.3rem">Используйте буквы, цифры и хотя бы один спец-символ.</div>
        </div>
        <div class="field">
          <label for="password2">Повторите пароль</label>
          <input type="password" id="password2" required minlength="8" autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn btn-red btn-block mt-1" id="submit-btn">Сохранить пароль</button>
      </form>
    </div>

    <div class="auth-foot">
      <a href="/login.html">← Вернуться ко входу</a>
    </div>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
(function () {
  // Достаём токен из ?token=... в URL
  const params = new URLSearchParams(location.search);
  const token = params.get('token') || '';

  const alertBox = document.getElementById('alert');
  const form = document.getElementById('reset-form');
  const btn = document.getElementById('submit-btn');
  function showAlert(type, text) {
    alertBox.className = 'alert alert-' + type + ' show';
    alertBox.textContent = text;
  }

  if (!token || token.length < 10) {
    showAlert('error', 'Ссылка некорректна. Запросите новую через «Забыли пароль?».');
    form.querySelectorAll('input, button').forEach(el => el.disabled = true);
    return;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.className = 'alert';
    const p1 = document.getElementById('password').value;
    const p2 = document.getElementById('password2').value;
    if (p1.length < 8) { showAlert('error', 'Пароль должен быть не короче 8 символов'); return; }
    if (p1 !== p2) { showAlert('error', 'Пароли не совпадают'); return; }
    btn.disabled = true;
    btn.textContent = 'Сохраняем…';
    try {
      const res = await AC.resetPassword(token, p1);
      showAlert('success', res.message || 'Пароль обновлён. Перенаправляем на вход…');
      form.querySelectorAll('input, button').forEach(el => el.disabled = true);
      setTimeout(() => { window.location.href = '/login.html'; }, 1800);
    } catch (err) {
      showAlert('error', err.message || 'Не удалось сохранить пароль. Запросите новую ссылку.');
      btn.disabled = false;
      btn.textContent = 'Сохранить пароль';
    }
  });
})();
</script>
<script src="/assets/i18n.js"></script>
</body>
</html>
