<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Вход - ATAMEKEN Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="/assets/logo.png" alt="ATAMEKEN Club" width="56" height="56" style="border-radius:50%;margin:0 auto 0.5rem"/>
      <div class="auth-brand-name">ATAMEKEN CLUB</div>
      <div class="auth-brand-sub">Личный кабинет</div>
    </div>

    <div class="card">
      <div class="card-hd">
        <h2>Вход</h2>
        <p>Войдите, чтобы продолжить</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email"/>
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <input type="password" id="password" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-red btn-block mt-1" id="submit-btn">Войти</button>
      </form>
    </div>

    <div class="auth-foot">
      Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
    </div>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
(function () {
  if (AC.getToken()) window.location.href = '/cabinet.html';

  const alertBox = document.getElementById('alert');
  function showAlert(type, text) {
    alertBox.className = 'alert alert-' + type + ' show';
    alertBox.textContent = text;
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.className = 'alert';
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Входим...';

    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    try {
      const data = await AC.login(email, password);
      // admin → админка
      const redirect = (data.user && data.user.email &&
        /admin/i.test(data.user.email)) ? '/admin.html' : '/cabinet.html';
      window.location.href = redirect;
    } catch (err) {
      showAlert('error', err.message || 'Ошибка входа');
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  });
})();
</script>
</body>
</html>
