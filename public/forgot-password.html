<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Восстановление пароля - ATAMEKEN Club</title>
<meta name="description" content="Восстановление пароля для аккаунта на платформе ATAMEKEN Club. Отправим ссылку на email."/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="/assets/logo.png" alt="ATAMEKEN Club" width="56" height="56" style="border-radius:50%;margin:0 auto 0.5rem"/>
      <div class="auth-brand-name" style="font-size:1rem;font-weight:500;letter-spacing:.02em;line-height:1.05">Бизнес-сообщество</div>
      <div class="auth-brand-name" style="font-size:1.2rem;font-weight:600;letter-spacing:.04em;margin-top:.1rem">«ATAMEKEN Club»</div>
      <div class="auth-brand-sub">Восстановление пароля</div>
    </div>

    <div class="card">
      <div class="card-hd">
        <h2>Забыли пароль?</h2>
        <p>Введите email от вашего аккаунта — отправим ссылку для установки нового пароля. Ссылка действует 1 час.</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="forgot-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com"/>
        </div>
        <button type="submit" class="btn btn-red btn-block mt-1" id="submit-btn">Отправить ссылку</button>
      </form>
    </div>

    <div class="auth-foot">
      Вспомнили пароль? <a href="/login.html">Войти</a>
    </div>
  </div>
</div>

<script src="/assets/api.js?v=20260723"></script>
<script>
(function () {
  if (AC.getToken()) window.location.href = '/cabinet.html';

  const alertBox = document.getElementById('alert');
  const form = document.getElementById('forgot-form');
  const btn = document.getElementById('submit-btn');
  function showAlert(type, text) {
    alertBox.className = 'alert alert-' + type + ' show';
    alertBox.textContent = text;
  }
  function hideAlert() { alertBox.className = 'alert'; }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    const email = document.getElementById('email').value.trim().toLowerCase();
    if (!email) { showAlert('error', 'Введите email'); return; }
    btn.disabled = true;
    btn.textContent = 'Отправляем…';
    try {
      const res = await AC.forgotPassword(email);
      showAlert('success', res.message || 'Если такой email зарегистрирован — ссылка отправлена. Проверьте почту (включая «Спам»).');
      // Блокируем форму после успеха, чтобы не спамил
      form.querySelectorAll('input, button').forEach(el => el.disabled = true);
      btn.textContent = '✓ Отправлено';
    } catch (err) {
      showAlert('error', err.message || 'Не удалось отправить. Попробуйте позже.');
      btn.disabled = false;
      btn.textContent = 'Отправить ссылку';
    }
  });
})();
</script>
<script src="/assets/i18n.js?v=20260723"></script>
</body>
</html>
