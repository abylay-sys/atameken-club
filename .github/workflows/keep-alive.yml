name: keep-alive

# ─── Зачем это нужно ─────────────────────────────────────────────────────────
# atameken-backend крутится на free-плане Render: инстанс засыпает после
# 15 минут простоя, и первый визит после сна ждёт ~50 секунд. Этот workflow
# дёргает /health, чтобы сервис оставался «бодрым».
#
# Почему НЕ круглосуточно: у free-плана 750 инстанс-часов в месяц на весь
# воркспейс. Пинг 24/7 = ~730 ч — это почти вся квота, и при её исчерпании
# Render ПРИОСТАНАВЛИВАЕТ сервис до следующего цикла (сайт ляжет).
# Поэтому окно 01:00–19:00 UTC = 06:00–00:00 Алматы (~570 ч/мес, запас ~180 ч).
# Окно покрывает рабочее время Казахстана, Европы и Китая — то есть всех,
# на кого рассчитан Реестр.
#
# Хотите 24/7 (и готовы к риску исчерпать квоту) — замените расписание на
# '*/5 * * * *'. Хотите совсем без ограничений — платный план Starter (~$7/мес).
#
# Оговорка: расписания GitHub Actions выполняются «по возможности» и иногда
# опаздывают на 5–15 минут, поэтому редкие засыпания всё же возможны.
# Полностью надёжные альтернативы: UptimeRobot (свой аккаунт) или Starter.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/5 1-19 * * *'
  workflow_dispatch: {} # можно запустить вручную из вкладки Actions

# Не копим очередь, если предыдущий запуск ещё идёт
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping atameken.club/health
        run: |
          url="https://atameken.club/health"
          # 3 попытки: холодный старт может занять до ~60 c, плюс во время
          # деплоя сервис ненадолго отдаёт 502 — не хотим ложных падений.
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 90 "$url" || echo 000)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "✔ сервис отвечает"
              exit 0
            fi
            sleep 15
          done
          echo "✖ /health не ответил 200 после 3 попыток"
          exit 1
